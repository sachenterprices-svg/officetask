name: Auto Deploy to FTP (crm.coralinfratel.com)

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy-crm-files:
    name: Deploy public/ → officetask/ via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload public/ to officetask/ (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:         ${{ secrets.FTP_SERVER }}
          username:       ${{ secrets.FTP_USERNAME }}
          password:       ${{ secrets.FTP_PASSWORD }}
          port:           21
          protocol:       ftp
          local-dir:      ./public/
          server-dir:     officetask/
          exclude:        |
            **/.git*
            **/.git*/**
            **/node_modules/**
          log-level:      verbose

      - name: Upload website/ to public_html/ (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:         ${{ secrets.FTP_SERVER }}
          username:       ${{ secrets.FTP_USERNAME }}
          password:       ${{ secrets.FTP_PASSWORD }}
          port:           21
          protocol:       ftp
          local-dir:      ./website/
          server-dir:     public_html/
          exclude:        |
            **/.git*
            **/.git*/**
          log-level:      verbose
