name: Auto Deploy to FTP (crm.coralinfratel.com)

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy-crm-files:
    name: Deploy public/ → officetask/ via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Write FTP credentials to netrc (safe - no shell injection)
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          printf 'machine %s login %s password %s\n' "$FTP_HOST" "$FTP_USER" "$FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          mkdir -p ~/.lftp
          echo "set ftp:ssl-allow no" >> ~/.lftp/rc
          echo "set net:timeout 30" >> ~/.lftp/rc
          echo "set net:reconnect-interval-base 5" >> ~/.lftp/rc
          echo "set net:max-retries 3" >> ~/.lftp/rc

      - name: Upload public/ → officetask/
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          lftp -e "
            mirror -R --delete --no-perms --parallel=4 \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              public/ officetask/;
            quit
          " ftp://$FTP_HOST

      - name: Upload website/ → public_html/
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          lftp -e "
            mirror -R --delete --no-perms --parallel=4 \
              --exclude-glob .git* \
              website/ public_html/;
            quit
          " ftp://$FTP_HOST

      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.netrc
