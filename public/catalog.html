<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog - ERP</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="auth.js"></script>
    <style>
        /* Catalog Specific */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .catalog-card {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .module-tile:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--active-border);
        }

        .module-tile.active {
            border-color: var(--active-border);
            background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%);
        }

        .sidebar-header {
            margin: 8px 0 4px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* --- CONTENT AREA --- */
        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .container {
            max-width: 1200px;
            margin: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid white;
        }

        .legacy-actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .btn-add {
            background: #002d72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            background: #2563eb;
        }
    </style>
</head>

<body>

    <header class="top-header">
        <div class="header-brand">
            <span style="color: #002d72;">Coral</span> <span style="color: #f97316;">Infratel</span>
        </div>
        <div class="user-meta">
            <span id="userInfoDisplay" style="font-weight:600;"></span>
            <button onclick="window.logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div class="app-body">
        <aside class="tile-sidebar">
            <div class="sidebar-header">MODULES</div>
            <a href="dashboard.html" class="module-tile"><i>🏠</i>
                <div class="tile-content">
                    <h4>Dashboard</h4>
                </div>
            </a>
            <a href="users.html" class="module-tile admin-only"><i>👥</i>
                <div class="tile-content">
                    <h4>Users</h4>
                </div>
            </a>
            <a href="index.html" class="module-tile"><i>📝</i>
                <div class="tile-content">
                    <h4>Proposals</h4>
                </div>
            </a>
            <a href="customers.html" class="module-tile"><i>📂</i>
                <div class="tile-content">
                    <h4>Customers</h4>
                </div>
            </a>
            <a href="complaints.html" class="module-tile"><i>🛠️</i>
                <div class="tile-content">
                    <h4>Complaints</h4>
                </div>
            </a>
            <a href="catalog.html" class="module-tile active admin-only"><i>📖</i>
                <div class="tile-content">
                    <h4>Catalog</h4>
                </div>
            </a>
            <a href="website_management.html" class="module-tile admin-only"><i>🌐</i>
                <div class="tile-content">
                    <h4>Website CMS</h4>
                </div>
            </a>
        </aside>

        <main class="content-area">
            <div class="container">
                <div class="legacy-actions">
                    <div>
                        <h1 style="font-size: 1.8rem; font-weight: 800; color: #0f172a; margin: 0;">Inventory Catalog
                        </h1>
                        <p style="color: #64748b; margin-top: 5px;">Manage pricing and specifications for hardware and
                            BSNL services.</p>
                    </div>
                    <button class="btn-add admin-only" id="addCatalogItemBtn">Add New Item</button>
                </div>

                <div id="catalogContent">Loading items...</div>
            </div>
        </main>
    </div>

    <!-- Modals & Scripts Reused -->
    <script src="catalog.js"></script>
</body>

</html>
