<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Management - Proposal Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="auth.js"></script>
    <style>
        .page-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .panel h3 {
            margin-top: 0;
            color: #0f172a;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        th {
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .admin-only {
            display: none;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }

        .form-row .input-group {
            margin-bottom: 0;
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="app-header">
        <div class="logo-container">
            <div class="coral-logo">
                <span class="c-blue">Coral</span> <span class="c-orange">Infratel</span>
            </div>
            <span class="app-title">Inventory Catalog</span>
        </div>
        <div class="nav-links">
            <a href="index.html" target="_blank">Proposals</a>
            <a href="catalog.html" target="_blank" style="text-decoration: underline;">Catalog</a>
            <a href="reports.html" target="_blank">Reports</a>
            <a href="users.html" class="admin-only" style="display:none;">Users</a>
            <button onclick="window.logout()" class="btn"
                style="padding: 6px 12px; margin-left: 15px; background: #e31837; border:none; color:white; border-radius: 4px; cursor: pointer;">Logout</button>
        </div>
    </div>

    <div class="page-content">
        <!-- Categories Panel -->
        <div class="panel">
            <h3>Item Categories</h3>

            <form id="addCategoryForm" class="admin-only" style="margin-bottom: 20px;">
                <div class="form-row">
                    <div class="input-group">
                        <label>New Category Name (e.g. Switch, IP Phone)</label>
                        <input type="text" id="catName" required>
                    </div>
                    <button type="submit" class="btn" style="height: 42px;">Add</button>
                </div>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>Category Name</th>
                    </tr>
                </thead>
                <tbody id="categoriesTableBody">
                    <tr>
                        <td style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Products Panel -->
        <div class="panel">
            <h3>Products & Models</h3>

            <form id="addProductForm" class="admin-only" style="margin-bottom: 20px;">
                <div class="form-row">
                    <div class="input-group" style="flex: 1.5;">
                        <label>Category</label>
                        <select id="prodCategory" required>
                            <option value="">Select...</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 2;">
                        <label>Model Name / Description</label>
                        <input type="text" id="prodName" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Default Price (₹)</label>
                        <input type="number" id="prodPrice" value="0" min="0">
                    </div>
                    <button type="submit" class="btn" style="height: 42px;">Add Item</button>
                </div>
            </form>

            <div class="input-group" style="margin-bottom: 15px; max-width: 300px;">
                <label>Filter by Category:</label>
                <select id="filterCategory">
                    <option value="">All Categories</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Model Name / Description</th>
                        <th style="text-align: right;">Default Rate (INR)</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr>
                        <td colspan="3" style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="catalog.js"></script>
</body>

</html>
