<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Section Reports - Office Task</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Customer Reports Specific */
        .report-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        }

        .module-tile:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--active-border);
        }

        .module-tile.active {
            border-color: var(--active-border);
            background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%);
        }

        .sidebar-header {
            margin: 8px 0 4px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* --- MAIN CONTENT AREA --- */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .report-header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #0033a0;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-group p {
            margin: 5px 0 0;
            color: #64748b;
            font-size: 0.875rem;
        }

        .report-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 1px;
        }

        .table-container {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: #f1f5f9;
            padding: 12px 15px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            cursor: pointer;
            white-space: nowrap;
        }

        th:hover {
            background: #e2e8f0;
        }

        th i {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-left: 5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
            color: #334155;
            white-space: nowrap;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .filter-header {
            background: #f8fafc;
            padding: 10px 15px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 35px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }

        .search-box input:focus {
            border-color: #0033a0;
            box-shadow: 0 0 0 3px rgba(0, 51, 160, 0.1);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-open {
            background: #dcfce7;
            color: #166534;
        }

        .status-closed {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-exp {
            background: #0033a0;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-exp:hover {
            background: #002277;
        }

        .loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            color: #64748b;
            font-weight: 500;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #0033a0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .action-cell {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-edit:hover {
            background: #e2e8f0;
            border-color: #94a3b8;
        }

        .btn-add-ext {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-add-ext:hover {
            background: #dcfce7;
            border-color: #86efac;
        }

        .btn-import {
            background: #f0fff4;
            color: #166534;
            border: 1px solid #166534;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-import:hover {
            background: #dcfce7;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <header class="top-header">
        <div class="header-brand">
            <span style="color: #002d72;">Coral</span> <span style="color: #f97316;">Infratel</span>
        </div>
        <div class="user-meta">
            <span id="userInfoDisplay" style="font-weight:600;"></span>
            <button onclick="window.logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div class="app-body">
        <aside class="tile-sidebar">
            <div class="sidebar-header">USER & SYSTEM</div>
            <a href="dashboard.html" class="module-tile"><i>🏠</i>
                <div class="tile-content">
                    <h4>Dashboard</h4>
                </div>
            </a>
            <a href="users.html" class="module-tile admin-only"><i>👥</i>
                <div class="tile-content">
                    <h4>Users</h4>
                </div>
            </a>

            <div class="sidebar-header" style="margin-top:20px;">BUSINESS MODULES</div>
            <a href="index.html" class="module-tile"><i>📝</i>
                <div class="tile-content">
                    <h4>Proposals</h4>
                </div>
            </a>
            <a href="customers.html" class="module-tile active"><i>📂</i>
                <div class="tile-content">
                    <h4>Customers</h4>
                </div>
            </a>
            <a href="complaints.html" class="module-tile"><i>🛠️</i>
                <div class="tile-content">
                    <h4>Complaints</h4>
                </div>
            </a>
            <a href="reconciliation.html" class="module-tile"><i>💰</i>
                <div class="tile-content">
                    <h4>Reconciliation</h4>
                </div>
            </a>
            <a href="recurring_tasks.html" class="module-tile admin-only"><i>⏱️</i>
                <div class="tile-content">
                    <h4>Recurring Tasks</h4>
                </div>
            </a>
        </aside>

        <main class="content-area">
            <div class="report-header">
                <div class="title-group">
                    <h1 id="reportTitle"><i class="fas fa-file-invoice"></i> Report Browser</h1>
                    <p id="reportSubTitle">Viewing section data</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <a id="importBtn" class="btn-import" href="import_data.html" style="text-decoration:none;">
                        <i class="fas fa-file-import"></i> IMPORT DATA
                    </a>
                    <button class="btn-exp" onclick="exportToExcel()"><i class="fas fa-download"></i> EXPORT TO
                        EXCEL</button>
                </div>
            </div>

            <div class="report-card">
                <div class="filter-header">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="globalSearch" placeholder="Filter rows...">
                    </div>
                    <div style="margin-left:auto; font-size:0.8rem; font-weight:600; color:#64748b;">
                        Found: <span id="recordCount" style="color:#0033a0">0</span> records
                    </div>
                </div>

                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                    Loading data...
                </div>

                <div class="table-container">
                    <table id="reportTable">
                        <thead id="reportHead"></thead>
                        <tbody id="reportData"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="auth.js"></script>
    <script src="customer_reports.js"></script>
</body>

</html>
