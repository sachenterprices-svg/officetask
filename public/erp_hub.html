<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSNL ERP - Coral Infratel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .erp-welcome-card {
            background: white;
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            max-width: 700px;
            margin: 100px auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .erp-welcome-card h1 {
            color: #002d72;
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .erp-welcome-card p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <header class="top-header">
        <div class="header-brand">
                <img src="assets/Coral Infratel logo.jpg" alt="Coral Infratel Pvt. Ltd." height="46" style="display:block; object-fit:contain;">
            </div>
        <div class="user-meta">
            <span id="userInfoDisplay" style="font-weight:600;"></span>
            <button onclick="window.logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div class="app-body">
        <aside class="tile-sidebar">
            <div class="sidebar-header">MENU</div>
            <a href="dashboard.html" class="module-tile"><i>🏠</i>
                <div class="tile-content">
                    <h4>Dashboard</h4>
                </div>
            </a>

            <div class="sidebar-header" style="margin-top:20px;">BSNL ERP</div>
            <a href="customers.html" class="module-tile"><i>📂</i>
                <div class="tile-content">
                    <h4>Customer Master</h4>
                </div>
            </a>
            <a href="reconciliation.html" class="module-tile"><i>💰</i>
                <div class="tile-content">
                    <h4>Reconciliation</h4>
                </div>
            </a>
            <a href="bsnl_setup.html" class="module-tile"><i>🏢</i>
                <div class="tile-content">
                    <h4>BSNL Circle/OA Setup</h4>
                </div>
            </a>

            <div class="sidebar-header" style="margin-top:20px;">BILLING</div>
            <a href="customer_bill.html" class="module-tile"><i>🧾</i>
                <div class="tile-content">
                    <h4>Customer Bill</h4>
                </div>
            </a>
        </aside>

        <main class="content-area"></main>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('crm_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userInfoDisplay').textContent = `${user.name || user.username} (${user.role === 'admin' ? 'Admin' : 'User'})`;
        });
    </script>
</body>

</html>
