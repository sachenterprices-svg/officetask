<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Coral Infratel CRM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002d72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --teal: #2ab5b2;
            --teal-dark: #1a8f8c;
            --red: #e31837;
            --red-dark: #c1122d;
        }

        body {
            background: #f0f9f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Left teal accent panel */
        body::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 45%;
            height: 100%;
            background: linear-gradient(160deg, #1a8f8c 0%, #2ab5b2 50%, #35c7c4 100%);
            clip-path: polygon(0 0, 85% 0, 65% 100%, 0 100%);
            z-index: 0;
        }

        /* Subtle red accent curve */
        body::after {
            content: '';
            position: absolute;
            left: 0; bottom: 0;
            width: 30%;
            height: 35%;
            background: linear-gradient(45deg, rgba(227, 24, 55, 0.7), rgba(227, 24, 55, 0));
            clip-path: polygon(0 40%, 100% 100%, 0 100%);
            z-index: 0;
        }

        .ambient-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            z-index: 0;
            filter: blur(100px);
        }

        .blob-1 {
            top: -150px;
            left: -100px;
            background: radial-gradient(circle, rgba(42, 181, 178, 0.2) 0%, transparent 70%);
        }

        .blob-2 {
            bottom: -150px;
            right: -100px;
            background: radial-gradient(circle, rgba(227, 24, 55, 0.1) 0%, transparent 70%);
        }

        .blob-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(42, 181, 178, 0.06) 0%, transparent 70%);
        }

        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.15), 0 0 40px rgba(42, 181, 178, 0.08);
            width: 100%;
            max-width: 440px;
            color: #1e293b;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-img {
            width: 230px;
            margin-bottom: 24px;
        }

        .login-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1e293b;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-size: 1rem;
            color: #1e293b;
        }

        .input-group input:focus {
            border-color: var(--teal);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(42, 181, 178, 0.12);
        }

        .login-btn {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 24px rgba(42, 181, 178, 0.3);
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(42, 181, 178, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: var(--red);
            font-size: 0.9rem;
            text-align: center;
            margin-top: 18px;
            display: none;
            padding: 12px;
            background: rgba(227, 24, 55, 0.06);
            border-radius: 10px;
            border: 1px solid rgba(227, 24, 55, 0.15);
        }

        .login-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--teal), var(--red), transparent);
            border-radius: 0 0 28px 28px;
        }
        @media (max-width: 480px) {
            .login-container { padding:25px 20px; border-radius:16px; max-width:95vw; }
            .logo-img { width:160px; }
            .login-header h2 { font-size:1.3rem; }
            .login-header p { font-size:0.85rem; }
            input[type="text"], input[type="password"] { padding:12px 14px; font-size:0.9rem; }
            .login-btn { padding:14px; font-size:1rem; }
        }
    </style>
    <script src="shield.js"></script>
</head>

<body>
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <div class="login-container">
        <div class="login-header">
            <img src="assets/Coral%20Infratel%20logo.jpg" alt="Coral Infratel" class="logo-img">
            <h2>Welcome Back</h2>
            <p>Sign in to your CRM account</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="login-btn">Log In</button>
            <div id="errorMessage" class="error-message">Invalid username or password</div>
        </form>
    </div>

    <!-- Cache-busting version added to force latest settings -->
    <script src="auth.js?v=4"></script>
    <script>
        // --- AUTO-RESTART / RECONNECT LOGIC ---
        // If the user visits the page and the server is down, this will keep checking
        // every 3 seconds and automatically reload the page once the server is back up.
        function checkServerHealth() {
            fetch('https://officetask-roan.vercel.app/api/health')
                .then(response => {
                    if (response.ok) {
                        // Server is up. If we previously showed an error, reload to restore normal state.
                        const errorDiv = document.getElementById('errorMessage');
                        if (errorDiv.innerText.includes("Connection lost")) {
                            window.location.reload();
                        }
                    }
                })
                .catch(err => {
                    const btn = document.querySelector('.login-btn');
                    const errorDiv = document.getElementById('errorMessage');
                    btn.disabled = true;
                    btn.textContent = 'Connecting...';
                    errorDiv.textContent = 'Connection lost. Waiting for server to restart...';
                    errorDiv.style.display = 'block';
                });
        }
        setInterval(checkServerHealth, 3000);
        // --------------------------------------

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.login-btn');
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.display = 'none';
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await window.apiFetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Save token and user info
                    localStorage.setItem('crm_token', data.token);
                    localStorage.setItem('crm_user', JSON.stringify(data.user));

                    // Redirect — app/ wrapper on production, dashboard on local
                    var isLocal = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1');
                    localStorage.setItem('_crmLastPage', 'dashboard.html');
                    window.location.href = isLocal ? 'dashboard.html' : 'app/';
                } else {
                    errorDiv.textContent = (data.error || 'Login failed') + (data.details ? ': ' + data.details : '');
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Login Fetch Error:', err);
                errorDiv.textContent = 'Server connection error: ' + err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = 'Log In';
                btn.disabled = false;
            }
        });
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}</script>
</body>

</html>
