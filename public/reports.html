<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Proposal Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="auth.js"></script>
    <style>
        .page-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .panel h3 {
            margin-top: 0;
            color: #0f172a;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        th {
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .admin-nav {
            display: none;
        }

        .badge-yes {
            background: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-no {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .overdue {
            color: #ef4444;
            font-weight: 700;
            background: #fee2e2;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .upcoming {
            color: #d97706;
            font-weight: 600;
        }

        .followup-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .followup-input {
            padding: 4px;
            font-size: 0.85em;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="app-header">
        <div class="logo-container">
            <div class="coral-logo">
                <span class="c-blue">Coral</span> <span class="c-orange">Infratel</span>
            </div>
            <span class="app-title">Reports Dashboard</span>
        </div>
        <div class="nav-links">
            <a href="index.html" target="_blank">Proposals</a>
            <a href="catalog.html" target="_blank">Catalog</a>
            <a href="reports.html" style="text-decoration: underline;">Reports</a>
            <a href="users.html" class="admin-nav">Users</a>
            <button onclick="window.logout()" class="btn"
                style="padding: 6px 12px; margin-left: 15px; background: #e31837; border:none; color:white; border-radius: 4px; cursor: pointer;">Logout</button>
        </div>
    </div>

    <div class="page-content">
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0; border:none; padding:0;">Generated Proposals</h3>
                <div id="followupCounters" style="display: flex; gap: 15px;">
                    <div
                        style="padding: 10px 15px; background: #fee2e2; color: #ef4444; border-radius: 8px; border: 1px solid #fecaca; font-weight: 600;">
                        Overdue: <span id="overdueCount">0</span>
                    </div>
                    <div
                        style="padding: 10px 15px; background: #fef3c7; color: #d97706; border-radius: 8px; border: 1px solid #fde68a; font-weight: 600;">
                        Today: <span id="todayCount">0</span>
                    </div>
                </div>
            </div>

            <div
                style="display: flex; gap: 15px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 8px;">
                <div style="flex: 2;">
                    <label style="display:block; font-size: 0.8em; color: #64748b; margin-bottom: 5px;">Search Customer
                        / Company</label>
                    <input type="text" id="searchInput" placeholder="Type to search..."
                        style="width:100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size: 0.8em; color: #64748b; margin-bottom: 5px;">Sort By</label>
                    <select id="sortSelect"
                        style="width:100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="name-asc">Customer (A-Z)</option>
                        <option value="name-desc">Customer (Z-A)</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size: 0.8em; color: #64748b; margin-bottom: 5px;">Direct Sale
                        Only</label>
                    <select id="filterDirect"
                        style="width:100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <option value="all">All Proposals</option>
                        <option value="yes">Direct Sale Only</option>
                        <option value="no">BSNL Services Only</option>
                    </select>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Customer / Company Name</th>
                        <th>Date & Time</th>
                        <th>Category</th>
                        <th>BSNL Circle</th>
                        <th>BSNL OA</th>
                        <th style="text-align:center;">Direct Sale?</th>
                        <th>Next Follow-up</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="reportsTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center;">Loading proposals...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" class="modal"
        style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto;">
        <div
            style="background: white; margin: 5% auto; padding: 25px; border-radius: 8px; width: 80%; max-width: 800px; position: relative;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">
                <h3 style="margin: 0;">Proposal Details</h3>
                <button onclick="document.getElementById('detailsModal').style.display='none'"
                    style="border:none; background:none; font-size: 1.5em; cursor:pointer;">&times;</button>
            </div>
            <div id="modalContent" style="font-size: 0.95em; line-height: 1.6;">
                <!-- Details will be injected here -->
            </div>
        </div>
    </div>

    <script src="reports.js"></script>
</body>

</html>
